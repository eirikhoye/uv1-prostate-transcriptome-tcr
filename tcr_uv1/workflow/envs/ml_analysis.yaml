name: ml_analysis_env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.9
  - numpy
  - pandas
  - scikit-learn
  - scipy
  - matplotlib
  - seaborn
  - jupyterlab
  - notebook
  - ipython
  - joblib
  - tqdm
  - xgboost
  - lightgbm
  - catboost
  - statsmodels
  - scikit-survival
  - lifelines
  - tensorflow
  - keras
  - pytorch
  - torchvision
  - torchaudio
  #- pytorch-cuda=11.8  # Adjust CUDA version if needed, or remove for CPU-only
  - pip
  - pip:
      - shap
      - eli5
      - lime
      - optuna
      - category_encoders
